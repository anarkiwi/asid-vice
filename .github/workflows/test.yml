---
name: test build
on: [push, pull_request]
jobs:
  test-build-latest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: test build
        run: ./build.sh

  docker-build:
    # Build the headless binmon image so the Dockerfile itself is exercised
    # (build.sh above runs on the runner, which ships utilities the slim base
    # image does not, so it does not catch missing Dockerfile build deps).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: docker build
        run: docker build -t asid-vice:latest .

  docker-build-x11:
    # Build the X11 (GTK3, full-feature) image that release.yml publishes, so
    # the Dockerfile.x11 build stays exercised on every push/PR without pushing.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: docker build x11
        run: docker build -f Dockerfile.x11 -t asid-vice:x11 .
